<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Eye — Scroll Animation</title>

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --aqua:       #1a6b6a;
    --aqua-deep:  #0d4f4e;
    --aqua-light: #2a9d8f;
    --aqua-glow:  #5ec4b6;
    --iris-outer: #0d4f4e;
    --iris-inner: #1a6b6a;
    --pupil:      #091f1f;
    --bg:         #f4f1ec;
    --bg-warm:    #ede8e0;
    --text:       #1a1a18;
  }

  html { scroll-behavior: auto; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Times New Roman", "Georgia", serif;
    overflow-x: hidden;
  }

  /* ── Intro Section ── */
  .intro {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .intro h1 {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--aqua-deep);
    margin-bottom: 1rem;
  }

  .intro p {
    font-size: 1.1rem;
    color: #8a857c;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  .scroll-hint {
    margin-top: 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    color: #b0a99e;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  .scroll-hint .line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, #b0a99e, transparent);
    animation: pulse-line 2s ease-in-out infinite;
  }

  @keyframes pulse-line {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ── Eye Section (scroll-pinned) ── */
  .eye-section {
    /* Tall container so ScrollTrigger has room to scrub */
    height: 400vh;
    position: relative;
  }

  .eye-pin {
    /* This element gets pinned by ScrollTrigger */
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  /* Subtle radial glow behind the eye */
  .eye-pin::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,107,106,0.06) 0%, transparent 70%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .eye-pin.glow-active::before {
    opacity: 1;
  }

  /* ── SVG Eye Styles ── */
  #eye-svg {
    width: 320px;
    height: 320px;
    overflow: visible;
  }

  /* Eyelid paths */
  .eyelid {
    fill: none;
    stroke: var(--aqua);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Eye outline that appears as lids open */
  .eye-outline {
    fill: none;
    stroke: var(--aqua);
    stroke-width: 2;
    stroke-linecap: round;
    opacity: 0;
  }

  /* Iris circles */
  .iris-outer {
    fill: none;
    stroke: var(--iris-outer);
    stroke-width: 1.5;
    opacity: 0;
  }

  .iris-inner {
    fill: none;
    stroke: var(--iris-inner);
    stroke-width: 1;
    opacity: 0;
  }

  .iris-detail {
    fill: none;
    stroke: var(--aqua-light);
    stroke-width: 0.5;
    opacity: 0;
  }

  /* Pupil */
  .pupil {
    fill: var(--pupil);
    opacity: 0;
  }

  /* Pupil highlight */
  .pupil-highlight {
    fill: rgba(255,255,255,0.6);
    opacity: 0;
  }

  /* Radiating beams */
  .beam {
    fill: none;
    stroke: var(--aqua-glow);
    stroke-width: 1;
    stroke-linecap: round;
    opacity: 0;
  }

  /* Fine decorative lash lines */
  .lash {
    fill: none;
    stroke: var(--aqua);
    stroke-width: 1;
    stroke-linecap: round;
    opacity: 0;
  }

  /* Inner glow ring */
  .glow-ring {
    fill: none;
    stroke: var(--aqua-glow);
    stroke-width: 0.5;
    opacity: 0;
  }

  /* ── Outro Section ── */
  .outro {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    background: var(--bg-warm);
  }

  .outro h2 {
    font-size: clamp(1.5rem, 4vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--aqua-deep);
  }

  .outro p {
    margin-top: 1rem;
    font-size: 1rem;
    color: #8a857c;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════
     SECTION 1 — Intro
     ════════════════════════════════════════════════════ -->
<section class="intro">
  <h1>The Eye</h1>
  <p>Scroll to awaken</p>
  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="line"></div>
  </div>
</section>

<!-- ════════════════════════════════════════════════════
     SECTION 2 — Eye Animation (pinned during scroll)
     ════════════════════════════════════════════════════ -->
<section class="eye-section">
  <div class="eye-pin">

    <!-- ─── SVG EYE ─── -->
    <svg id="eye-svg" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">

      <!-- ═══ LAYER 1: Radiating beams (behind everything) ═══
           12 beams extending outward from center.
           CUSTOMIZE: Change the x1/y1/x2/y2 values or add more <line> elements. -->
      <g id="beams">
        <line class="beam" x1="160" y1="160" x2="160" y2="20"/>
        <line class="beam" x1="160" y1="160" x2="230" y2="38"/>
        <line class="beam" x1="160" y1="160" x2="282" y2="90"/>
        <line class="beam" x1="160" y1="160" x2="300" y2="160"/>
        <line class="beam" x1="160" y1="160" x2="282" y2="230"/>
        <line class="beam" x1="160" y1="160" x2="230" y2="282"/>
        <line class="beam" x1="160" y1="160" x2="160" y2="300"/>
        <line class="beam" x1="160" y1="160" x2="90"  y2="282"/>
        <line class="beam" x1="160" y1="160" x2="38"  y2="230"/>
        <line class="beam" x1="160" y1="160" x2="20"  y2="160"/>
        <line class="beam" x1="160" y1="160" x2="38"  y2="90"/>
        <line class="beam" x1="160" y1="160" x2="90"  y2="38"/>
      </g>

      <!-- ═══ LAYER 2: Outer glow rings ═══
           CUSTOMIZE: Adjust radii for different glow sizes. -->
      <circle class="glow-ring" cx="160" cy="160" r="90"/>
      <circle class="glow-ring" cx="160" cy="160" r="110"/>

      <!-- ═══ LAYER 3: Eye outline (almond shape) ═══
           CUSTOMIZE: Replace this path with your own eye outline shape.
           This is a symmetrical almond using cubic beziers. -->
      <path class="eye-outline" id="eye-outline"
            d="M 50,160 C 90,110 130,95 160,95 C 190,95 230,110 270,160 C 230,210 190,225 160,225 C 130,225 90,210 50,160 Z"/>

      <!-- ═══ LAYER 4: Iris ═══
           CUSTOMIZE: Replace circles with detailed iris SVG paths. -->
      <circle class="iris-outer" cx="160" cy="160" r="45"/>
      <circle class="iris-inner" cx="160" cy="160" r="32"/>

      <!-- Fine iris radial detail lines -->
      <g id="iris-details">
        <line class="iris-detail" x1="160" y1="118" x2="160" y2="128"/>
        <line class="iris-detail" x1="160" y1="192" x2="160" y2="202"/>
        <line class="iris-detail" x1="118" y1="160" x2="128" y2="160"/>
        <line class="iris-detail" x1="192" y1="160" x2="202" y2="160"/>
        <line class="iris-detail" x1="130" y1="130" x2="137" y2="137"/>
        <line class="iris-detail" x1="190" y1="130" x2="183" y2="137"/>
        <line class="iris-detail" x1="130" y1="190" x2="137" y2="183"/>
        <line class="iris-detail" x1="190" y1="190" x2="183" y2="183"/>
      </g>

      <!-- ═══ LAYER 5: Pupil ═══
           CUSTOMIZE: Adjust r for pupil size. -->
      <circle class="pupil" cx="160" cy="160" r="16"/>
      <circle class="pupil-highlight" cx="152" cy="152" r="4"/>

      <!-- ═══ LAYER 6: Eyelids (top and bottom) ═══
           These are the main animated elements — they morph from closed to open.
           CUSTOMIZE: Replace d="" paths with your own eyelid shapes. -->

      <!-- Upper eyelid: starts as a horizontal line, morphs to curved lid -->
      <path class="eyelid" id="upper-lid"
            d="M 50,160 C 90,160 130,160 160,160 C 190,160 230,160 270,160"/>

      <!-- Lower eyelid: starts as a same horizontal line, morphs to curved lid -->
      <path class="eyelid" id="lower-lid"
            d="M 50,160 C 90,160 130,160 160,160 C 190,160 230,160 270,160"/>

      <!-- ═══ LAYER 7: Decorative lashes ═══
           CUSTOMIZE: Adjust positions and angles for different lash styles. -->
      <g id="lashes-upper">
        <line class="lash" x1="80"  y1="130" x2="75"  y2="110"/>
        <line class="lash" x1="110" y1="112" x2="105" y2="90"/>
        <line class="lash" x1="140" y1="100" x2="138" y2="78"/>
        <line class="lash" x1="160" y1="95"  x2="160" y2="72"/>
        <line class="lash" x1="180" y1="100" x2="182" y2="78"/>
        <line class="lash" x1="210" y1="112" x2="215" y2="90"/>
        <line class="lash" x1="240" y1="130" x2="245" y2="110"/>
      </g>
      <g id="lashes-lower">
        <line class="lash" x1="100" y1="200" x2="95"  y2="218"/>
        <line class="lash" x1="130" y1="215" x2="128" y2="235"/>
        <line class="lash" x1="160" y1="225" x2="160" y2="245"/>
        <line class="lash" x1="190" y1="215" x2="192" y2="235"/>
        <line class="lash" x1="220" y1="200" x2="225" y2="218"/>
      </g>

    </svg>
  </div>
</section>

<!-- ════════════════════════════════════════════════════
     SECTION 3 — Outro
     ════════════════════════════════════════════════════ -->
<section class="outro">
  <h2>Now You See</h2>
  <p>The vision is yours.</p>
</section>

<!-- ── GSAP + ScrollTrigger ── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

// ── References ──
const eyeSvg     = document.getElementById("eye-svg");
const eyePin     = document.querySelector(".eye-pin");
const upperLid   = document.getElementById("upper-lid");
const lowerLid   = document.getElementById("lower-lid");
const eyeOutline = document.getElementById("eye-outline");

// ── Eyelid path states ──
// CUSTOMIZE: Replace these d="" values to change the eyelid shapes.
// "closed" = flat horizontal line at y=160 (eye shut)
// "open"   = curved lids forming the almond eye opening

const LID_PATHS = {
  upper: {
    closed: "M 50,160 C 90,160 130,160 160,160 C 190,160 230,160 270,160",
    open:   "M 50,160 C 90,110 130,95  160,95  C 190,95  230,110 270,160",
  },
  lower: {
    closed: "M 50,160 C 90,160 130,160 160,160 C 190,160 230,160 270,160",
    open:   "M 50,160 C 90,210 130,225 160,225 C 190,225 230,210 270,160",
  },
};

// ── Master timeline (scrubbed by scroll) ──
const tl = gsap.timeline({
  scrollTrigger: {
    trigger: ".eye-section",
    start: "top top",
    end: "bottom bottom",
    pin: ".eye-pin",
    scrub: 1,        // Smooth scrub tied to scroll position
    // markers: true, // Uncomment to debug scroll positions
    onUpdate: (self) => {
      // Activate glow when eye is partially open
      eyePin.classList.toggle("glow-active", self.progress > 0.15);
    },
  },
});

// ────────────────────────────────────────────────────
// PHASE 1 (0% → 30%): Eyelids open
// ────────────────────────────────────────────────────

// Upper lid opens upward
tl.to(upperLid, {
  attr: { d: LID_PATHS.upper.open },
  duration: 3,
  ease: "power2.inOut",
}, 0);

// Lower lid opens downward
tl.to(lowerLid, {
  attr: { d: LID_PATHS.lower.open },
  duration: 3,
  ease: "power2.inOut",
}, 0);

// Eye outline fades in as lids separate
tl.to(eyeOutline, {
  opacity: 0.4,
  duration: 2,
  ease: "power1.in",
}, 0.5);

// ────────────────────────────────────────────────────
// PHASE 2 (20% → 50%): Iris and pupil appear
// ────────────────────────────────────────────────────

// Outer iris ring
tl.to(".iris-outer", {
  opacity: 1,
  duration: 2,
  ease: "power1.inOut",
}, 2);

// Inner iris ring
tl.to(".iris-inner", {
  opacity: 0.7,
  duration: 2,
  ease: "power1.inOut",
}, 2.5);

// Iris detail lines
tl.to(".iris-detail", {
  opacity: 0.5,
  duration: 1.5,
  stagger: 0.1,
  ease: "power1.inOut",
}, 2.5);

// Pupil appears
tl.to(".pupil", {
  opacity: 1,
  duration: 1.5,
  ease: "power2.inOut",
}, 3);

// Pupil highlight
tl.to(".pupil-highlight", {
  opacity: 1,
  duration: 1,
  ease: "power1.in",
}, 3.5);

// ────────────────────────────────────────────────────
// PHASE 3 (40% → 70%): Scale up + lashes appear
// ────────────────────────────────────────────────────

// Scale the entire SVG up
tl.to(eyeSvg, {
  scale: 1.4,
  duration: 4,
  ease: "power1.inOut",
}, 3);

// Upper lashes fan out
tl.to("#lashes-upper .lash", {
  opacity: 0.7,
  duration: 1.5,
  stagger: 0.08,
  ease: "power1.out",
}, 4);

// Lower lashes fan out
tl.to("#lashes-lower .lash", {
  opacity: 0.5,
  duration: 1.5,
  stagger: 0.08,
  ease: "power1.out",
}, 4.5);

// ────────────────────────────────────────────────────
// PHASE 4 (60% → 90%): Beams radiate outward
// ────────────────────────────────────────────────────

// Glow rings pulse in
tl.to(".glow-ring", {
  opacity: 0.3,
  duration: 2,
  stagger: 0.3,
  ease: "power1.inOut",
}, 5);

// Beams extend outward from center (drawSVG-like effect via strokeDasharray)
const beams = document.querySelectorAll(".beam");
beams.forEach((beam) => {
  const length = beam.getTotalLength();
  beam.style.strokeDasharray = length;
  beam.style.strokeDashoffset = length;
});

tl.to(".beam", {
  strokeDashoffset: 0,
  opacity: 0.5,
  duration: 3,
  stagger: { each: 0.1, from: "random" },
  ease: "power2.out",
}, 5.5);

// Continue scaling slightly
tl.to(eyeSvg, {
  scale: 1.6,
  duration: 3,
  ease: "power1.inOut",
}, 6);

// ────────────────────────────────────────────────────
// PHASE 5 (85% → 100%): Final glow + settle
// ────────────────────────────────────────────────────

// Glow rings brighten
tl.to(".glow-ring", {
  opacity: 0.15,
  duration: 2,
  ease: "power1.inOut",
}, 8);

// Beams soften
tl.to(".beam", {
  opacity: 0.25,
  duration: 2,
  ease: "power1.inOut",
}, 8);

// Eye outline strengthens
tl.to(eyeOutline, {
  opacity: 0.6,
  duration: 2,
  ease: "power1.inOut",
}, 8);

// Iris pulses slightly at the end
tl.to(".iris-outer", {
  attr: { r: 48 },
  duration: 1.5,
  ease: "power1.inOut",
}, 8.5);

tl.to(".iris-outer", {
  attr: { r: 45 },
  duration: 1.5,
  ease: "power1.inOut",
}, 9);
</script>

</body>
</html>
